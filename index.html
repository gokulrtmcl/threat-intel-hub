<!-- Tabs Navigation -->
<div class="tabs">
    <button class="tab-btn active" onclick="openTab('urlTab')">URL Checker</button>
    <button class="tab-btn" onclick="openTab('hashTab')">Hash Checker</button>
    <button class="tab-btn" onclick="openTab('fileTab')">File/APK</button>
    <button class="tab-btn" onclick="openTab('settingsTab')">Settings</button>
</div>

<!-- Tabs Content -->
<div id="urlTab" class="tab-content">
    <input type="text" id="urlInput" placeholder="Enter URL here...">
    <button onclick="scanURL()">Scan URL</button>
</div>

<div id="hashTab" class="tab-content hidden">
    <input type="text" id="hashInput" placeholder="Enter MD5/SHA256 Hash...">
    <button onclick="scanHash()">Scan Hash</button>
</div>

<div id="fileTab" class="tab-content hidden">
    <input type="file" id="fileInput">
    <button onclick="scanFile()">Scan File</button>
</div>

<!-- Settings Tab to Save API Key -->
<div id="settingsTab" class="tab-content hidden">
    <h3>API Configuration</h3>
    <input type="password" id="vtApiKey" placeholder="Enter your VirusTotal API Key">
    <button onclick="saveApiKey()">Save API Key</button>
    <p><small>Your key is stored securely in your local browser.</small></p>
</div>
