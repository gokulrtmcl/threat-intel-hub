<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Threat Intel Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔍 SOC Threat Intel Hub</h1>
        <p>Enter a URL to check its reputation across multiple platforms.</p>
        
        <div class="api-section">
            <input type="password" id="vtApiKey" placeholder="Enter VirusTotal API Key">
        </div>

        <div class="search-section">
            <input type="text" id="urlInput" placeholder="https://example.com">
            <button id="scanBtn">Scan URL</button>
        </div>

        <div id="loading" class="hidden">Scanning... Please wait...</div>

        <div id="results" class="hidden">
            <h2>Scan Results</h2>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Platform</th>
                        <th>Status</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Results will be injected here by JS -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
